options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 1: Install Node.js dependencies and run Jest tests
  # If tests fail, the build will stop here, preventing deployment.
  - name: 'node:20' # Use a Node.js image with npm (or specify a different version if needed)
    id: 'Run Jest Tests'
    entrypoint: 'bash'
    dir: 'frontend' # Change this if your Node.js project is in a different subdirectory
    args:
      - '-c'
      - |
          echo "Running Jest tests..."
          npm ci # Install Node.js dependencies
          npm test -- --ci --coverage # Run Jest tests in CI mode, generating coverage

  # Step 2: Install Python dependencies and run Python unittest tests
  # If tests fail, the build will stop here, preventing deployment.
  - name: 'python:3.12' # Use a Python image with pip (or specify a different version if needed)
    id: 'Run Python Unit Tests'
    entrypoint: 'bash'
    dir: 'backend' # Change this if your Python project is in a different subdirectory
    args:
      - '-c'
      - |
          echo "Running Python unit tests..."
          pip install -r requirements.txt # Install Python dependencies
          # Assuming your unit tests are in a 'tests' folder within the backend directory
          python -m unittest discover -s ./tests

  # Step 3: Build the Docker image
  # This step will only run if both Jest and Python tests pass.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'BuildImage'
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/long-octane-477515-k6/cloud-run-source-deploy/stay-and-trek-service:latest
      - . # Assumes Dockerfile is in the root directory. Adjust 'dir' if it's elsewhere.

  # Step 4: Push the Docker image to Artifact Registry
  # This step will only run if the Docker image build was successful.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'PushImage'
    args:
      - push
      - europe-west1-docker.pkg.dev/long-octane-477515-k6/cloud-run-source-deploy/stay-and-trek-service:latest

  # Step 5: Deploy the new image to Cloud Run
  # This step will ONLY run if all preceding test and build/push steps are successful.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'DeployToCloudRun'
    args:
      - gcloud
      - run
      - deploy
      - stay-and-trek-service
      - --image
      - europe-west1-docker.pkg.dev/long-octane-477515-k6/cloud-run-source-deploy/stay-and-trek-service:latest
      - --region
      - europe-west1
      - --add-cloudsql-instances=long-octane-477515-k6:europe-west1:stay-trek-db
      - --service-account
      - cloud-run-service-account@${PROJECT_ID}.iam.gserviceaccount.com
      - --set-secrets=MY_API_KEY=api_key_secret:latest
      - --set-env-vars=ACTIVE_DB=new
      - --set-env-vars=NEW_DB_NAME=trails_db
      - --set-env-vars=NEW_DB_USER=postgres
      - --set-env-vars=NEW_DB_HOST=/cloudsql/long-octane-477515-k6:europe-west1:stay-trek-db
      - --set-env-vars=SECRET_KEY=django-insecure-nehw-)k@fa!el1zw5jdj#bn-x&@c)ph7sjd7i%%91$xwrcze)b
      - --set-env-vars=OPENWEATHERMAP_API_KEY=d7f38f79ac1c83a0ed6867548326ece9
      - --set-secrets=NEW_DB_PASSWORD=cloud_sql_password:latest
      - --allow-unauthenticated
    env:
      - 'CLOUDSDK_CORE_PROJECT=$PROJECT_ID'

images:
  - europe-west1-docker.pkg.dev/long-octane-477515-k6/cloud-run-source-deploy/stay-and-trek-service:latest
