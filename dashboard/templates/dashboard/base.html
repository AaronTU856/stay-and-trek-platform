{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <style>
        #map { height: 600px; }
        .control-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .filter-section { border: 1px solid #dee2e6; border-radius: 5px; padding: 15px; margin-bottom: 15px; }
        .layer-toggle { margin: 5px 0; }
        .stats-card { background: linear-gradient(135deg, #2E8B57 0%, #1e6f42 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .export-btn { margin: 5px; }
        .loading { display: none; text-align: center; padding: 20px; }
        .feature-info { position: absolute; bottom: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 5px; display: none; max-width: 300px; }
    </style>
{% endblock %}
