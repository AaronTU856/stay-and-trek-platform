services:
  nginx:
    image: nginx:latest  # Change from 'build' to 'image' to avoid Dockerfile conflicts
    container_name: nginx_container
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles_volume:/app/staticfiles:ro
    depends_on:
      - web
    networks:
      - app_network

  web:
    build: .
    container_name: django_container
    command: sh -c "python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app:delegated
      - staticfiles_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DEBUG=1
      - SECRET_KEY=your_secret_key_here
      - DATABASE_URL=postgres://postgres:postgres@db:5432/stayandtrek
      - POSTGRES_DB=stayandtrek
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - app_network

  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    container_name: postgres_container
    platform: linux/amd64  # Use amd64 to work on your M1 Mac
    environment:
      POSTGRES_DB: stayandtrek
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network

volumes:
  postgres_data:
  staticfiles_volume:

networks:
  app_network:
    driver: bridge
